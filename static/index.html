<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text-secondary: #8b949e;
  --accent: #58a6ff;
  --accent-dim: #1f6feb;
  --green: #3fb950;
  --orange: #d29922;
  --red: #f85149;
  --purple: #bc8cff;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

.app { display: grid; grid-template-rows: 44px 1fr; height: 100vh; }

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; background: var(--bg-secondary); border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 13px; font-weight: 600; }
.header h1 span { color: var(--accent); }
.header .meta { font-size: 11px; color: var(--text-secondary); display: flex; gap: 12px; align-items: center; }
.header .dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.main { display: grid; grid-template-columns: 320px 1fr; overflow: hidden; }

/* Sidebar */
.sidebar { background: var(--bg-secondary); border-right: 1px solid var(--border); overflow-y: auto; }
.sidebar-header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
.sidebar-header h2 { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.refresh-btn { background: none; border: 1px solid var(--border); color: var(--text-secondary); padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.refresh-btn:hover { background: var(--bg-tertiary); color: var(--text); }

.req-card { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s; }
.req-card:hover { background: var(--bg-tertiary); }
.req-card.active { background: var(--bg-tertiary); border-left: 3px solid var(--accent); }
.req-card .user-text { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.req-card .req-meta { font-size: 11px; color: var(--text-secondary); display: flex; gap: 8px; flex-wrap: wrap; }
.req-card .type-badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 500; }
.type-main { background: rgba(88,166,255,0.15); color: var(--accent); }
.type-tool_call { background: rgba(210,153,34,0.15); color: var(--orange); }
.type-recap { background: rgba(139,148,158,0.15); color: var(--text-secondary); }

/* Detail */
.detail { overflow-y: auto; padding: 24px 32px; }
.detail-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); flex-direction: column; gap: 8px; }

/* Cards */
.card { margin-bottom: 20px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.card-title { padding: 10px 16px; background: var(--bg-secondary); font-size: 12px; font-weight: 600; color: var(--text-secondary); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.card-title:hover { background: var(--bg-tertiary); }
.card-body { padding: 16px; font-size: 13px; line-height: 1.6; }
.card-body.collapsed { display: none; }
.card-body.mono { font-family: 'Cascadia Code','Fira Code',monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; max-height: 500px; overflow-y: auto; }

/* User input highlight */
.user-input-card { border-color: var(--accent-dim); }
.user-input-card .card-body { font-size: 16px; font-weight: 500; padding: 20px; }

/* Steps */
.step { display: flex; gap: 10px; padding: 6px 0; align-items: flex-start; }
.step-icon { flex-shrink: 0; width: 22px; text-align: center; font-size: 14px; }
.step-content { flex: 1; }
.step-label { font-weight: 600; font-size: 12px; }
.step-detail { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

/* Context bar */
.ctx-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; background: var(--bg-tertiary); margin: 8px 0; }
.ctx-bar div { height: 100%; }
.ctx-list { margin-top: 8px; }
.ctx-item { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
.ctx-item:last-child { border-bottom: none; }
.ctx-item .name { display: flex; align-items: center; gap: 6px; }
.ctx-item .dot { width: 8px; height: 8px; border-radius: 2px; }
.ctx-item .size { color: var(--text-secondary); }

.ctx-item-expand { border-bottom: 1px solid var(--border); }
.ctx-item-expand:last-child { border-bottom: none; }
.ctx-item-expand .ctx-item { cursor: pointer; }
.ctx-item-expand .ctx-item:hover { background: var(--bg-tertiary); }
.ctx-item-content.collapsed { display: none; }

/* Tools list */
.tool-list { display: flex; flex-wrap: wrap; gap: 6px; }
.tool-tag { font-size: 11px; padding: 3px 8px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 4px; }
.tool-tag.used { border-color: var(--green); color: var(--green); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* History */
.hist-turn { margin-bottom: 4px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.hist-turn-header { padding: 8px 12px; font-size: 12px; font-weight: 500; cursor: pointer; background: var(--bg-secondary); }
.hist-turn-header:hover { background: var(--bg-tertiary); }
.hist-turn-body { padding: 8px 12px; }
.hist-turn-body.collapsed { display: none; }
.hist-msg { display: flex; gap: 8px; align-items: flex-start; padding: 4px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
.hist-msg:last-child { border-bottom: none; }
.hist-icon { flex-shrink: 0; width: 18px; text-align: center; }
.hist-label { flex-shrink: 0; font-weight: 600; min-width: 50px; color: var(--text); font-size: 11px; }
.hist-text { color: var(--text-secondary); word-break: break-all; line-height: 1.5; }

/* JSON Highlight */
.hl-section { color: var(--text-secondary); font-weight: 600; margin: 8px 0 4px; }
.hl-line { padding: 1px 0; }
.hl-key { color: var(--text-secondary); }
.hl-key-important { color: var(--accent); font-weight: 600; }
.hl-key-thinking { color: var(--purple); }
.hl-key-tool { color: var(--orange); }
.hl-val { color: var(--green); }
.hl-dim { color: #484f58; }
.hl-str { color: var(--text-secondary); }
.hl-str-user { color: var(--text); background: rgba(88,166,255,0.1); padding: 1px 4px; border-radius: 2px; }
.hl-str-tool { color: var(--orange); font-weight: 600; }
.hl-str-thinking { color: var(--purple); font-style: italic; }
.hl-str-system { color: #484f58; }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1><span>AI Agent</span> Explorer</h1>
    <div class="meta">
      <span id="stats">加载中...</span>
      <div class="dot"></div>
      <span>实时</span>
    </div>
  </header>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>请求列表</h2>
        <button class="refresh-btn" onclick="loadRequests()">刷新</button>
      </div>
      <div id="request-list"></div>
    </div>
    <div class="detail" id="detail">
      <div class="detail-empty">
        <div style="font-size:32px;opacity:0.3;">🔍</div>
        <div>选择左侧请求查看分析</div>
      </div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let currentId = null;

async function loadRequests() {
  try {
    const r = await (await fetch(`${API}/api/requests?limit=100`)).json();
    document.getElementById('stats').textContent = `${r.total} 条请求`;
    renderList(r.requests);
  } catch(e) {
    document.getElementById('request-list').innerHTML = '<div style="padding:20px;font-size:12px;color:var(--text-secondary)">连接失败，确保 server.py 在运行</div>';
  }
}

function renderList(requests) {
  const c = document.getElementById('request-list');
  if (!requests.length) { c.innerHTML = '<div style="padding:20px;font-size:12px;color:var(--text-secondary)">暂无数据</div>'; return; }
  c.innerHTML = requests.map(r => {
    const time = new Date(r.timestamp).toLocaleString('zh-CN',{hour12:false, year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit'});
    const tokens = r.usage?.input_tokens ? fmtK(parseInt(r.usage.input_tokens)) : `~${fmtK(Math.round(r.context_chars/4))}`;
    const elapsed = r.elapsed_ms ? `${(r.elapsed_ms/1000).toFixed(1)}s` : '';
    const typeLabel = {main:'主请求',tool_call:'工具调用',recap:'Recap'}[r.request_type]||'';
    const typeCls = `type-${r.request_type||'main'}`;
    const preview = r.preview || '#' + r.id;
    return `<div class="req-card ${r.id===currentId?'active':''}" onclick="loadDetail(${r.id})">
      <div class="user-text">${esc(preview)}</div>
      <div class="req-meta">
        <span class="type-badge ${typeCls}">${typeLabel}</span>
        <span>${tokens}</span>
        <span>${elapsed}</span>
        <span>${time}</span>
      </div>
    </div>`;
  }).join('');
}

async function loadDetail(id) {
  currentId = id;
  loadRequests();
  try {
    const [detail, context] = await Promise.all([
      (await fetch(`${API}/api/requests/${id}`)).json(),
      (await fetch(`${API}/api/requests/${id}/context`)).json(),
    ]);
    renderDetail(detail, context);
  } catch(e) { document.getElementById('detail').innerHTML = '<div class="detail-empty">加载失败</div>'; }
}

function renderDetail(detail, context) {
  const panel = document.getElementById('detail');
  const body = detail.request?.body || {};
  const time = new Date(detail.timestamp).toLocaleString('zh-CN',{hour12:false, year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit'});
  const model = detail.model || '?';
  const elapsed = detail.elapsed_ms ? `${(detail.elapsed_ms/1000).toFixed(1)}s` : '?';

  // Extract user input
  const userInput = extractUserInput(body);
  // Extract steps from messages
  const steps = extractSteps(body);
  // Extract tools used (from response)
  const toolsUsed = extractToolsUsed(detail);
  // All tools available
  const allTools = (body.tools || []).map(t => t.name || '?');
  // Context breakdown
  const ctxSections = context.sections || [];
  const bd = context.breakdown || {claude_md:null,rules:[],memory:null,skills:[],history_turns:0,tool_results:[],model_params:{}};
  // Final output
  const finalOutput = extractFinalOutput(detail);

  panel.innerHTML = `
    <div style="font-size:11px;color:var(--text-secondary);margin-bottom:16px;">
      ${time} · ${model} · ${elapsed} · #${detail.id}
    </div>

    <!-- 第一层：我问了什么 -->
    <div class="card user-input-card">
      <div class="card-title">👤 我问了什么</div>
      <div class="card-body">${esc(userInput) || '<span style="color:var(--text-secondary)">[工具调用 / 系统请求]</span>'}</div>
    </div>

    <!-- 第二层：Claude 做了什么 -->
    <div class="card">
      <div class="card-title" onclick="toggle(this)">🤖 Claude 做了什么 <span style="font-weight:400;color:var(--text-secondary)">${steps.length} 步</span></div>
      <div class="card-body">
        ${steps.length ? steps.map(s => `<div class="step"><span class="step-icon">${s.icon}</span><div class="step-content"><div class="step-label">${esc(s.label)}</div>${s.detail ? `<div class="step-detail">${esc(s.detail)}</div>` : ''}</div></div>`).join('') : '<span style="color:var(--text-secondary)">无执行步骤（可能是首次请求）</span>'}
      </div>
    </div>

    <!-- 第三层：使用了什么能力 -->
    <div class="card">
      <div class="card-title" onclick="toggle(this)">🔧 使用了什么能力 <span style="font-weight:400;color:var(--text-secondary)">${toolsUsed.length} / ${allTools.length} 工具</span></div>
      <div class="card-body">
        ${allTools.length ? `<div class="tool-list">${allTools.map(t => `<span class="tool-tag ${toolsUsed.includes(t)?'used':''}">${esc(t)}</span>`).join('')}</div>` : '<span style="color:var(--text-secondary)">无工具</span>'}
        ${toolsUsed.length ? `<div style="margin-top:8px;font-size:11px;color:var(--green)">✓ 本次使用: ${toolsUsed.join(', ')}</div>` : ''}
      </div>
    </div>

    <!-- 第四层：Claude 看到了什么 -->
    <div class="card">
      <div class="card-title" onclick="toggle(this)">👁️ Claude 看到了什么（上下文） <span style="font-weight:400;color:var(--text-secondary)">~${fmtK(context.total_tokens_estimate)} tokens · ${bd.history_turns} 轮历史</span></div>
      <div class="card-body">
        <div style="margin-bottom:12px;">
          ${bd.claude_md ? `<div class="ctx-item"><span class="name">📄 CLAUDE.md</span><span class="size">${esc(bd.claude_md.path.split(/[/\\\\]/).pop())}</span></div><div style="font-size:11px;color:var(--text-secondary);padding:4px 0 8px 20px;border-bottom:1px solid var(--border)">${esc(bd.claude_md.content.substring(0,200))}${bd.claude_md.content.length>200?'...':''}</div>` : '<div class="ctx-item"><span class="name">📄 CLAUDE.md</span><span class="size" style="color:var(--text-secondary)">未检测到</span></div>'}
          ${bd.rules.length ? bd.rules.map(r => `<div class="ctx-item"><span class="name">📏 Rule</span><span class="size">${esc(r.path.split(/[/\\\\]/).pop())}</span></div><div style="font-size:11px;color:var(--text-secondary);padding:4px 0 8px 20px;border-bottom:1px solid var(--border)">${esc(r.content.substring(0,120))}...</div>`).join('') : '<div class="ctx-item"><span class="name">📏 Rules</span><span class="size">无</span></div>'}
          ${bd.memory ? `<div class="ctx-item"><span class="name">🧠 Memory</span><span class="size">${bd.memory.chars} 字符</span></div><div style="font-size:11px;color:var(--text-secondary);padding:4px 0 8px 20px;border-bottom:1px solid var(--border)">${esc(bd.memory.content.substring(0,200))}...</div>` : '<div class="ctx-item"><span class="name">🧠 Memory</span><span class="size">无</span></div>'}
          ${bd.skills.length ? `<div class="ctx-item"><span class="name">⚡ Skills（仅名称+描述）</span><span class="size">${bd.skills.length} 个</span></div><div style="font-size:11px;color:var(--text-secondary);padding:4px 0 8px 20px;border-bottom:1px solid var(--border)">${bd.skills.slice(0,15).join(', ')}${bd.skills.length>15?' ...':''}</div>` : ''}
          <div class="ctx-item"><span class="name">💬 对话历史</span><span class="size">${bd.history_turns} 轮对话带入</span></div>
          ${bd.history_turns > 0 ? `<div style="margin:8px 0 8px 20px">${renderHistory(detail.request?.body?.messages || [])}</div>` : ''}
          ${bd.tool_results.length ? `<div class="ctx-item"><span class="name">📥 上轮工具结果</span><span class="size">${bd.tool_results.length} 条结果带入</span></div>` : ''}
        </div>
        <div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">Token 占比分布</div>
        <div class="ctx-bar">
          ${ctxSections.map((s,i) => {
            const pct = context.total_chars > 0 ? (s.chars/context.total_chars*100) : 0;
            const colors = ['#58a6ff','#3fb950','#d29922','#bc8cff','#f85149','#79c0ff','#f0883e'];
            return `<div style="width:${pct}%;background:${colors[i%colors.length]}"></div>`;
          }).join('')}
        </div>
        <div class="ctx-list">
          ${ctxSections.map((s,i) => {
            const colors = ['#58a6ff','#3fb950','#d29922','#bc8cff','#f85149','#79c0ff','#f0883e'];
            const fixed = s.is_fixed ? ' <span class="hl-dim">(固定模板)</span>' : '';
            return `<div class="ctx-item-expand">
              <div class="ctx-item" onclick="this.nextElementSibling.classList.toggle('collapsed')">
                <span class="name"><span class="dot" style="background:${colors[i%colors.length]}"></span>${esc(s.label)}${fixed}</span>
                <span class="size">~${fmtK(s.chars/4)} tokens ${s.is_fixed ? '' : '▼'}</span>
              </div>
              <div class="ctx-item-content ${s.is_fixed ? 'collapsed' : 'collapsed'}" style="font-size:11px;color:var(--text-secondary);padding:4px 0 4px 28px;max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;">${esc((s.content||'').substring(0,800))}${(s.content||'').length>800?'...<span class=hl-dim>[查看原始数据获取完整内容]</span>':''}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <!-- 第五层：Claude 回了什么 -->
    <div class="card">
      <div class="card-title" onclick="toggle(this)">💬 Claude 回了什么 <span style="font-weight:400;color:var(--text-secondary)">${renderStopReason(detail)}</span></div>
      <div class="card-body">${renderFullResponse(detail)}</div>
    </div>

    <!-- 第六层：原始数据 -->
    <div class="card">
      <div class="card-title" onclick="toggle(this)">📤 原始 Request <span style="font-weight:400;color:var(--text-secondary)">点击展开</span></div>
      <div class="card-body mono collapsed">${renderHighlightedRequest(detail)}</div>
    </div>
    <div class="card">
      <div class="card-title" onclick="toggle(this)">📥 原始 Response <span style="font-weight:400;color:var(--text-secondary)">点击展开</span></div>
      <div class="card-body mono collapsed">${renderHighlightedResponse(detail)}</div>
    </div>
  `;
}

// ── 数据提取 ──────────────────────────────

function extractUserInput(body) {
  const messages = body.messages || [];
  for (const msg of messages) {
    if (msg.role !== 'user') continue;
    const content = msg.content;
    if (typeof content === 'string') {
      if (content.includes('stepped away')) return '[Recap]';
      return content.substring(0, 300);
    }
    if (Array.isArray(content)) {
      if (content.some(c => c.type === 'tool_result')) continue; // skip tool results
      const texts = content.filter(c => c.type === 'text' && !c.text?.startsWith('<system-reminder>')).map(c => c.text?.trim()).filter(Boolean);
      if (texts.length) return texts.join(' ').substring(0, 300);
    }
  }
  // fallback: last user message
  for (let i = messages.length - 1; i >= 0; i--) {
    if (messages[i].role === 'user') {
      const c = messages[i].content;
      if (typeof c === 'string') return c.substring(0, 200);
      if (Array.isArray(c)) {
        const t = c.filter(x => x.type === 'text').map(x => x.text||'').join(' ');
        if (t.includes('Perform a web search')) return t.substring(0, 200);
        return t.substring(0, 200);
      }
    }
  }
  return '';
}

function extractSteps(body) {
  const steps = [];
  const messages = body.messages || [];
  for (const msg of messages) {
    if (msg.role === 'assistant' && Array.isArray(msg.content)) {
      for (const block of msg.content) {
        if (block.type === 'thinking' && block.thinking) {
          steps.push({icon:'💭', label:'思考', detail: block.thinking.substring(0,100) + (block.thinking.length>100?'...':'')});
        } else if (block.type === 'tool_use') {
          const input = JSON.stringify(block.input||{});
          steps.push({icon:'🔧', label:`调用 ${block.name}`, detail: input.substring(0,80)});
        } else if (block.type === 'text' && block.text) {
          steps.push({icon:'💬', label:'回复', detail: block.text.substring(0,100) + (block.text.length>100?'...':'')});
        }
      }
    } else if (msg.role === 'user' && Array.isArray(msg.content)) {
      if (msg.content.some(c => c.type === 'tool_result')) {
        const tr = msg.content.find(c => c.type === 'tool_result');
        const preview = typeof tr.content === 'string' ? tr.content.substring(0,60) : '[数据]';
        steps.push({icon:'📥', label:'工具返回', detail: preview + '...'});
      }
    }
  }
  return steps;
}

function extractToolsUsed(detail) {
  const used = new Set();
  const body = detail.request?.body || {};
  const messages = body.messages || [];
  for (const msg of messages) {
    if (msg.role === 'assistant' && Array.isArray(msg.content)) {
      for (const block of msg.content) {
        if (block.type === 'tool_use' && block.name) used.add(block.name);
      }
    }
  }
  // Also check response
  const resp = detail.response?.body;
  if (resp && !resp._streaming && Array.isArray(resp.content)) {
    for (const block of resp.content) {
      if (block.type === 'tool_use' && block.name) used.add(block.name);
    }
  }
  return [...used];
}

// ── JSON 高亮渲染系统 ──────────────────────

function renderHighlightedRequest(detail) {
  const req = detail.request || {};
  const headers = req.headers || {};
  const body = req.body || {};

  let html = `<div class="hl-section">── 请求信息 ──</div>`;
  html += `<div class="hl-line">Method: <span class="hl-val">${detail.method||'POST'}</span> Path: <span class="hl-val">/${detail.path||''}</span></div>`;
  html += `<div class="hl-section">── 请求头 ──</div>`;
  for (const [k,v] of Object.entries(headers)) {
    const cls = k.toLowerCase().includes('authorization') ? 'hl-dim' : '';
    html += `<div class="hl-line ${cls}"><span class="hl-key">${esc(k)}</span>: ${esc(String(v).substring(0,100))}</div>`;
  }
  html += `<div class="hl-section">── 请求体 ──</div>`;
  html += renderJsonTree(body, 0, 'request');
  return html;
}

function renderHighlightedResponse(detail) {
  const resp = detail.response || {};
  const headers = resp.headers || {};
  const body = resp.body;

  let html = `<div class="hl-section">Status: <span class="hl-val">${resp.status||'?'}</span></div>`;
  html += `<div class="hl-section">── 响应头 ──</div>`;
  for (const [k,v] of Object.entries(headers)) {
    html += `<div class="hl-line"><span class="hl-key">${esc(k)}</span>: ${esc(String(v).substring(0,120))}</div>`;
  }
  html += `<div class="hl-section">── 响应体 ──</div>`;
  if (body) {
    html += renderJsonTree(body, 0, 'response');
  } else {
    html += '<span class="hl-dim">null</span>';
  }
  return html;
}

function renderJsonTree(obj, depth, context) {
  if (depth > 6) return `<span class="hl-dim">${esc(JSON.stringify(obj).substring(0,100))}...</span>`;
  if (obj === null) return '<span class="hl-dim">null</span>';
  if (typeof obj === 'boolean') return `<span class="hl-val">${obj}</span>`;
  if (typeof obj === 'number') return `<span class="hl-val">${obj}</span>`;
  if (typeof obj === 'string') {
    // Highlight rules for strings
    const len = obj.length;
    if (len > 500) {
      // Long string: show truncated with highlight if it's important
      const cls = getStringHighlight(obj, context);
      return `<span class="${cls}" title="完整内容 ${len} 字符">${esc(obj.substring(0,200))}...<span class="hl-dim">[${len} chars]</span></span>`;
    }
    const cls = getStringHighlight(obj, context);
    return `<span class="${cls}">${esc(obj)}</span>`;
  }
  if (Array.isArray(obj)) {
    if (obj.length === 0) return '[]';
    if (obj.length > 20 && depth > 2) return `<span class="hl-dim">[...${obj.length} items]</span>`;
    let html = '[\n';
    for (let i = 0; i < Math.min(obj.length, 50); i++) {
      html += pad(depth+1) + renderJsonNode(obj[i], depth+1, context, i);
      if (i < obj.length-1) html += ',';
      html += '\n';
    }
    if (obj.length > 50) html += pad(depth+1) + `<span class="hl-dim">...${obj.length-50} more items</span>\n`;
    html += pad(depth) + ']';
    return html;
  }
  if (typeof obj === 'object') {
    const keys = Object.keys(obj);
    if (keys.length === 0) return '{}';
    let html = '{\n';
    for (let i = 0; i < keys.length; i++) {
      const k = keys[i];
      const v = obj[k];
      const keyCls = getKeyHighlight(k, context);
      html += pad(depth+1) + `<span class="${keyCls}">"${esc(k)}"</span>: `;
      html += renderJsonTree(v, depth+1, getChildContext(k, context));
      if (i < keys.length-1) html += ',';
      html += '\n';
    }
    html += pad(depth) + '}';
    return html;
  }
  return esc(String(obj));
}

function renderJsonNode(item, depth, context, index) {
  return renderJsonTree(item, depth, context);
}

function pad(depth) { return '  '.repeat(depth); }

function getKeyHighlight(key, context) {
  // Request context highlights
  const importantKeys = ['model','messages','system','tools','thinking','max_tokens','stream'];
  const userKeys = ['text','content','role'];
  const toolKeys = ['name','input','type','tool_use_id'];

  if (importantKeys.includes(key)) return 'hl-key-important';
  if (key === 'thinking' || key === 'signature') return 'hl-key-thinking';
  if (toolKeys.includes(key) && context?.includes('tool')) return 'hl-key-tool';
  return 'hl-key';
}

function getStringHighlight(str, context) {
  // Highlight user input
  if (!str.startsWith('<system-reminder>') && !str.startsWith('{') && str.length > 5 && str.length < 300) {
    if (context === 'user-text') return 'hl-str-user';
  }
  // Highlight tool names
  if (context === 'tool-name') return 'hl-str-tool';
  // Highlight thinking
  if (context === 'thinking-text') return 'hl-str-thinking';
  // System reminder
  if (str.startsWith('<system-reminder>')) return 'hl-str-system';
  return 'hl-str';
}

function getChildContext(key, parentContext) {
  if (key === 'messages') return 'messages';
  if (key === 'tools') return 'tools';
  if (key === 'system') return 'system';
  if (key === 'thinking') return 'thinking-text';
  if (key === 'text' && parentContext === 'messages') return 'user-text';
  if (key === 'name' && parentContext === 'tools') return 'tool-name';
  if (key === 'content') return 'content';
  return parentContext || '';
}

// ── Message 渲染系统（可复用）──────────────

function renderMessage(msg, opts = {}) {
  const role = msg.role || 'unknown';
  const content = msg.content;
  const mode = opts.mode || 'preview'; // preview | full

  if (role === 'user') {
    if (typeof content === 'string') {
      if (content.includes('stepped away')) return {icon:'🔄', label:'系统 Recap', text: ''};
      return {icon:'👤', label:'用户', text: content.substring(0, mode==='full'?2000:150)};
    }
    if (Array.isArray(content)) {
      // tool_result
      const tr = content.find(c => c.type === 'tool_result');
      if (tr) {
        const preview = typeof tr.content === 'string' ? tr.content : JSON.stringify(tr.content||'');
        return {icon:'📥', label:'工具返回', text: preview.substring(0, mode==='full'?1000:80)};
      }
      // user text (skip system-reminder)
      const texts = content.filter(c => c.type==='text' && !c.text?.startsWith('<system-reminder>')).map(c=>c.text?.trim()).filter(Boolean);
      return {icon:'👤', label:'用户', text: texts.join(' ').substring(0, mode==='full'?2000:150)};
    }
  }

  if (role === 'assistant') {
    if (Array.isArray(content)) {
      const parts = [];
      for (const block of content) {
        if (block.type === 'thinking' && block.thinking) {
          parts.push({icon:'💭', label:'思考', text: block.thinking.substring(0, mode==='full'?500:80)});
        } else if (block.type === 'text' && block.text) {
          parts.push({icon:'💬', label:'回复', text: block.text.substring(0, mode==='full'?1000:120)});
        } else if (block.type === 'tool_use') {
          parts.push({icon:'🔧', label:`调用 ${block.name}`, text: JSON.stringify(block.input||{}).substring(0,80)});
        }
      }
      return {icon:'🤖', label:'Claude', parts: parts};
    }
    if (typeof content === 'string') {
      return {icon:'🤖', label:'回复', text: content.substring(0, mode==='full'?1000:120)};
    }
  }

  if (role === 'system') {
    const text = typeof content === 'string' ? content : JSON.stringify(content);
    return {icon:'⚙️', label:'系统指令', text: text.substring(0, 60) + '...'};
  }

  return {icon:'❓', label: role, text: ''};
}

function renderHistory(messages) {
  // Group into turns: a turn = user msg + assistant msg (skip first user with system-reminder and system msgs)
  const turns = [];
  let currentTurn = null;

  for (const msg of messages) {
    if (msg.role === 'system') continue; // skip system messages
    if (msg.role === 'user') {
      // Skip the first user message with system-reminder (it's context, not history)
      const content = msg.content;
      if (Array.isArray(content) && content.some(c => c.type==='text' && c.text?.startsWith('<system-reminder>'))) continue;
      if (currentTurn) turns.push(currentTurn);
      currentTurn = {user: msg, assistant: null, toolResults: []};
    } else if (msg.role === 'assistant') {
      if (!currentTurn) currentTurn = {user: null, assistant: null, toolResults: []};
      currentTurn.assistant = msg;
    }
    // tool_result messages come as role:user with tool_result content
    if (msg.role === 'user' && Array.isArray(msg.content) && msg.content.some(c => c.type === 'tool_result')) {
      if (currentTurn) currentTurn.toolResults.push(msg);
    }
  }
  if (currentTurn) turns.push(currentTurn);

  if (turns.length === 0) return '<span style="color:var(--text-secondary);font-size:11px;">无对话历史</span>';

  return turns.map((turn, i) => {
    const userMsg = turn.user ? renderMessage(turn.user, {mode:'preview'}) : null;
    const assistMsg = turn.assistant ? renderMessage(turn.assistant, {mode:'preview'}) : null;

    const userText = userMsg ? esc(userMsg.text || '') : '';
    const turnPreview = userText ? userText.substring(0,40) : '(工具调用)';

    let detailHtml = '';
    // User
    if (userMsg && userMsg.text) {
      detailHtml += `<div class="hist-msg"><span class="hist-icon">${userMsg.icon}</span><span class="hist-label">${esc(userMsg.label)}</span><span class="hist-text">${esc(userMsg.text)}</span></div>`;
    }
    // Tool results
    for (const tr of turn.toolResults) {
      const trMsg = renderMessage(tr, {mode:'preview'});
      detailHtml += `<div class="hist-msg"><span class="hist-icon">${trMsg.icon}</span><span class="hist-label">${esc(trMsg.label)}</span><span class="hist-text">${esc(trMsg.text)}</span></div>`;
    }
    // Assistant
    if (assistMsg) {
      if (assistMsg.parts) {
        for (const p of assistMsg.parts) {
          detailHtml += `<div class="hist-msg"><span class="hist-icon">${p.icon}</span><span class="hist-label">${esc(p.label)}</span><span class="hist-text">${esc(p.text)}</span></div>`;
        }
      } else if (assistMsg.text) {
        detailHtml += `<div class="hist-msg"><span class="hist-icon">${assistMsg.icon}</span><span class="hist-label">${esc(assistMsg.label)}</span><span class="hist-text">${esc(assistMsg.text)}</span></div>`;
      }
    }

    return `<div class="hist-turn">
      <div class="hist-turn-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">
        <span>▶ 第 ${i+1} 轮：${esc(turnPreview)}</span>
      </div>
      <div class="hist-turn-body collapsed">${detailHtml}</div>
    </div>`;
  }).join('');
}

function extractFinalOutput(detail) {
  const resp = detail.response?.body;
  if (!resp) return '';
  if (resp._streaming) return ''; // streaming, can't easily extract
  if (Array.isArray(resp.content)) {
    const texts = resp.content.filter(c => c.type === 'text').map(c => c.text||'');
    if (texts.length) return texts.join('\n').substring(0, 500);
    // tool_use in response
    const tools = resp.content.filter(c => c.type === 'tool_use');
    if (tools.length) return `[调用 ${tools.map(t=>t.name).join(', ')}]`;
  }
  return '';
}

function renderStopReason(detail) {
  const resp = detail.response?.body;
  if (!resp) return '';
  const sr = resp.stop_reason;
  if (!sr) return '';
  const labels = {end_turn:'正常结束', tool_use:'需要调用工具', max_tokens:'被截断(max_tokens)'};
  const usage = resp.usage;
  let text = labels[sr] || sr;
  if (usage) {
    text += ` · 输入${fmtK(usage.input_tokens||0)} 输出${fmtK(usage.output_tokens||0)}`;
    if (usage.cache_read_input_tokens) text += ` 缓存${fmtK(usage.cache_read_input_tokens)}`;
  }
  return text;
}

function renderFullResponse(detail) {
  const resp = detail.response?.body;
  if (!resp) return '<span style="color:var(--text-secondary)">无响应数据</span>';

  // Streaming response
  if (resp._streaming && resp.events) {
    const startEvt = resp.events.find(e => e.type === 'message_start');
    const usage = startEvt?.message?.usage;
    let html = '';
    if (usage) {
      html += `<div style="font-size:11px;color:var(--text-secondary);margin-bottom:8px;">输入: ${usage.input_tokens} tokens · 缓存读取: ${usage.cache_read_input_tokens||0} · 缓存创建: ${usage.cache_creation_input_tokens||0}</div>`;
    }
    html += '<span style="color:var(--text-secondary);font-size:12px;">流式响应（仅捕获了开头事件，完整内容见原始数据）</span>';
    return html;
  }

  // Non-streaming: full response
  if (Array.isArray(resp.content)) {
    let html = '';
    // Usage info
    if (resp.usage) {
      html += `<div style="font-size:11px;color:var(--text-secondary);margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)">输入: ${resp.usage.input_tokens} · 输出: ${resp.usage.output_tokens} · 缓存读取: ${resp.usage.cache_read_input_tokens||0}</div>`;
    }
    for (const block of resp.content) {
      if (block.type === 'thinking' && block.thinking) {
        html += `<div class="step"><span class="step-icon">💭</span><div class="step-content"><div class="step-label">思考</div><div class="step-detail">${esc(block.thinking.substring(0,300))}${block.thinking.length>300?'...':''}</div></div></div>`;
      } else if (block.type === 'text') {
        html += `<div class="step"><span class="step-icon">💬</span><div class="step-content"><div class="step-label">回复</div><div class="step-detail">${esc(block.text?.substring(0,500))}${(block.text?.length||0)>500?'...':''}</div></div></div>`;
      } else if (block.type === 'tool_use') {
        html += `<div class="step"><span class="step-icon">🔧</span><div class="step-content"><div class="step-label">调用 ${esc(block.name)}</div><div class="step-detail">${esc(JSON.stringify(block.input||{}).substring(0,150))}</div></div></div>`;
      } else if (block.type === 'server_tool_use') {
        html += `<div class="step"><span class="step-icon">🌐</span><div class="step-content"><div class="step-label">服务端工具 ${esc(block.name)}</div><div class="step-detail">${esc(JSON.stringify(block.input||{}).substring(0,150))}</div></div></div>`;
      }
    }
    // Stop reason
    if (resp.stop_reason) {
      const srLabels = {end_turn:'✅ 正常结束', tool_use:'🔄 需要继续调用工具', max_tokens:'⚠️ 被截断'};
      html += `<div style="margin-top:8px;font-size:11px;color:var(--text-secondary)">${srLabels[resp.stop_reason]||resp.stop_reason}</div>`;
    }
    return html || '<span style="color:var(--text-secondary)">空响应</span>';
  }

  return `<span style="color:var(--text-secondary)">非标准响应格式</span>`;
}

// ── 工具函数 ──────────────────────────────

function toggle(el) { el.nextElementSibling.classList.toggle('collapsed'); }
function fmtK(n) { n=Math.round(n); return n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'K':n.toString(); }
function esc(t) { if(!t) return ''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

// ── 自动刷新 ──────────────────────────────
loadRequests();
setInterval(loadRequests, 3000);
</script>
